stages:
  preprocess:
    cmd: python src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data/raw/house_data.csv
    outs:
      - data/processed/processed_house_data.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/processed_house_data.csv
      - params.yaml
    outs:
      - models/model.pkl